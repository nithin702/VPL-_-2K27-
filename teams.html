
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPL Teams</title>

<link rel="stylesheet" href="teams.css">

</head>

<body>

<h1>🏏 VPL 2K27 Team Management</h1>

<button id="backBtn">
⬅ Back to Admin
</button>

<hr>

<h2>➕ Add Team</h2>

<form id="teamForm">

<input
type="text"
id="teamName"
placeholder="Team Name"
required>

<input
type="text"
id="ownerName"
placeholder="Owner Name"
required>

<input
type="text"
id="logoUrl"
placeholder="Team Logo URL (optional)">

<input
type="number"
id="teamPurse"
value="150000"
required>

<button type="submit">
💾 Save Team
</button>

</form>

<hr>

<h2>🏆 Teams</h2>

<div id="teamsList">

<p>No Teams Added</p>

</div>

<script type="module" src="teams.js"></script>

</body>

</html>
