<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPL 2K27 Live Score</title>

<link rel="stylesheet" href="live-score.css">

</head>

<body>

<div class="container">

<!-- ================= HEADER ================= -->

<header class="header">

<h1>🏆 VPL 2K27 LIVE SCORE</h1>

<p>Professional Live Scoring System</p>

</header>

<!-- ================= MATCH SETUP ================= -->

<section class="match-setup">

<div class="input-group">

<label>Select Match</label>

<select id="matchSelect">

<option value="">Select Match</option>

</select>

</div>

<div class="input-group">

<label>Toss Winner</label>

<select id="tossWinner">

<option value="">Select Team</option>

</select>

</div>

<div class="input-group">

<label>Toss Decision</label>

<select id="tossDecision">

<option value="bat">Bat</option>

<option value="bowl">Bowl</option>

</select>

</div>

<button id="startMatchBtn" class="start-btn">

▶ START MATCH

</button>

</section>

<!-- ================= SCOREBOARD ================= -->

<section class="scoreboard">

<h2 id="battingTeam">

Batting Team

</h2>

<h1 id="liveScore">

0 / 0

</h1>

<h3 id="overs">

0.0 / 15 Overs

</h3>

<div class="score-info">

<div class="info-box">

<h4>CRR</h4>

<p id="crr">

0.00

</p>

</div>

<div class="info-box">

<h4>Target</h4>

<p id="target">

--

</p>

</div>

<div class="info-box">

<h4>Need</h4>

<p id="needRuns">

--

</p>

</div>

<div class="info-box">

<h4>RRR</h4>

<p id="rrr">

--

</p>

</div>

</div>

</section>
