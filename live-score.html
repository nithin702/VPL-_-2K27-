<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPL 2K27 Live Score</title>

<link rel="stylesheet" href="live-score.css">

</head>

<body>

<h1>🏏 Live Score Panel</h1>

<button id="backBtn">⬅ Back</button>

<div class="container">

<h2>Select Match</h2>

<select id="matchSelect">

<option value="">-- Select Match --</option>

</select>
<!-- ================= Player Selection ================= -->

<div id="playerSelection" style="display:none; margin:20px 0;">

<h2>🏏 Select Players</h2>

<label>Striker</label><br>

<select id="striker">

<option value="">Select Striker</option>

</select>

<br><br>

<label>Non-Striker</label><br>

<select id="nonStriker">

<option value="">Select Non-Striker</option>

</select>

<br><br>

<label>Bowler</label><br>

<select id="bowler">

<option value="">Select Bowler</option>

</select>

<br><br>

<button id="startScoring">

▶ Start Scoring

</button>

</div>
<div id="scoreBoard">

<p>Select a match to start scoring...</p>

</div>

</div>

<script type="module" src="live-score.js"></script>

</body>

</html>
