
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPL Admin Login</title>

<style>
body{
font-family:Arial;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#222;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:gold;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}
</style>

</head>

<body>

<div class="box">

<h2>🔐 Admin Login</h2>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<script src="login.js"></script>

</body>
</html>
