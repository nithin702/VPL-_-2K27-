<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPL 2K27 Admin Panel</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#111;
            color:white;
            margin:0;
            padding:20px;
        }
        h1{
            color:gold;
            text-align:center;
        }
        #players{
            margin-top:20px;
        }
        .card{
            background:#222;
            padding:15px;
            margin-bottom:10px;
            border-left:5px solid gold;
            border-radius:8px;
        }
    </style>
</head>
<body>

<h1>🏏 VPL 2K27 Admin Panel</h1>
    <button id="logoutBtn"
style="float:right;
background:red;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;">
🚪 Logout
    </button>
<p id="totalPlayers">Total Players: 0</p>

<input
  type="text"
  id="searchBox"
  placeholder="Search by Name / Mobile / Village"
  style="width:100%;padding:10px;margin:15px 0;border-radius:8px;border:none;font-size:16px;">
<div id="players">
    <p>Loading registrations...</p>
</div>
<script type="module" src="admin.js"></script>
</body>
</html>
