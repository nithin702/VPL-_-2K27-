<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPL 2K27 Admin Panel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:gold;
margin-bottom:10px;
}

#topButtons{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin:20px 0;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

#logoutBtn{
background:red;
color:white;
}

#downloadExcel{
background:green;
color:white;
}

#manageTeamsBtn{
background:#2196F3;
color:white;
}

#auctionBtn{
background:#ff9800;
color:white;
}

#searchBox{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
margin:15px 0;
box-sizing:border-box;
}

#players{
margin-top:20px;
}

.card{
background:#222;
padding:15px;
border-left:5px solid gold;
border-radius:10px;
margin-bottom:15px;
}

.stats{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
background:#222;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.stats div{
margin:5px 0;
font-size:17px;
font-weight:bold;
color:#ffd700;
}

</style>

</head>

<body>

<h1>🏏 VPL 2K27 Admin Panel</h1>
<div class="stats">

<div id="totalPlayers">
👥 Total Players : 0
</div>

<div id="verifiedPlayers">
✅ Verified : 0
</div>

<div id="pendingPlayers">
🟡 Pending : 0
</div>

</div>

<div id="topButtons">

<button id="downloadExcel">
📥 Download Excel
</button>

<button
id="manageTeamsBtn"
onclick="window.location.href='teams.html'">
🏏 Manage Teams
</button>

<button
id="auctionBtn"
onclick="window.location.href='auction.html'">
🏆 Auction Panel
</button>
  
<button
  onclick="window.location.href='live-score.html'">
  style="background:#e91e63;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;">
  🏏 Live Score
  </button>
  
<button id="logoutBtn">
🚪 Logout
</button>

</div>

<input
type="text"
id="searchBox"
placeholder="🔍 Search by Name / Mobile / Village">

<div id="players">

<p style="text-align:center;">
Loading registrations...
</p>

</div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<script type="module" src="admin.js"></script>

</body>
</html>
