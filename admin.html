<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>VPL 2K27 Admin Panel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:gold;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.stats div{
flex:1;
min-width:180px;
background:#222;
padding:15px;
border-radius:10px;
text-align:center;
font-size:18px;
font-weight:bold;
color:gold;
}

#topButtons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

button{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
color:white;
}

button:hover{
transform:scale(1.05);
}

#downloadExcel{background:#2e7d32;}
#manageTeamsBtn{background:#1565c0;}
#scheduleBtn{background:#8e24aa;}
#auctionBtn{background:#ef6c00;}
#liveScoreBtn{background:#d81b60;}
#pointsBtn{background:#00897b;}
#statsBtn{background:#6d4c41;}
#logoutBtn{background:#c62828;}

#searchBox{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:20px;
box-sizing:border-box;
}

#players{
margin-top:20px;
}

.card{
background:#222;
padding:15px;
border-left:5px solid gold;
border-radius:10px;
margin-bottom:15px;
}

</style>

</head>

<body>

<h1>🏏 VPL 2K27 Admin Panel</h1>

<div class="stats">

<div id="totalPlayers">
👥 Total Players : 0
</div>

<div id="verifiedPlayers">
✅ Verified : 0
</div>

<div id="pendingPlayers">
🟡 Pending : 0
</div>

</div>

<div id="topButtons">
  <button id="downloadExcel">
📥 Download Excel
</button>

<button
id="manageTeamsBtn"
onclick="window.location.href='teams.html'">

👥 Manage Teams

</button>

<button
id="scheduleBtn"
onclick="window.location.href='schedule.html'">

📅 Match Schedule

</button>

<button
id="auctionBtn"
onclick="window.location.href='auction.html'">

🏆 Auction Panel

</button>

<button
id="liveScoreBtn"
onclick="window.location.href='live-score-v2.html'">

🏏 Live Score

</button>

<button
id="pointsBtn"
onclick="window.location.href='points.html'">

📊 Points Table

</button>

<button
id="statsBtn"
onclick="window.location.href='player-stats.html'">

📈 Player Statistics

</button>

<button id="logoutBtn">

🚪 Logout

</button>

</div>

<input
type="text"
id="searchBox"
placeholder="🔍 Search by Name / Mobile / Village">

<div id="players">

<p style="text-align:center;">

Loading registrations...

</p>

</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<script type="module" src="admin.js"></script>

</body>

</html>
