<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VPL 2K27 Registration</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🏆 Vallivedu Premier League</h1>

<p>Where Village Talent Meets Glory</p>

</header>

<section class="hero">

<h2>Player Registration</h2>

<p>Registration Fee : <b>₹200</b></p>

</section>

<section class="register">

<h2>Register Now</h2>

<form>

<input type="text" placeholder="Player Name" required>

<input type="file" id="playerPhoto" accept="image/*" required>

<input type="number" placeholder="Age" required>

<input type="text" placeholder="Village" required>

<input type="tel" placeholder="Mobile Number" required>

<select required>
<option value="">Batting Style</option>
<option>Right Hand</option>
<option>Left Hand</option>
</select>

<select required>
<option value="">Bowling Style</option>
<option>Fast</option>
<option>Medium Pace</option>
<option>Spin</option>
</select>

<select required>
<option value="">Player Role</option>
<option>Batsman</option>
<option>Bowler</option>
<option>All Rounder</option>
<option>Wicket Keeper</option>
</select>

<div class="payment">

<h3>Registration Fee : ₹200</h3>

<p>UPI ID : <b>Editable Later</b></p>

<input type="text" placeholder="Transaction ID" required>





<button type="submit">Register Player</button>

</form>

</section>

<footer>

<h3>Vallivedu Youth</h3>

<p>WhatsApp : 9603958781</p>

<p>© 2027 Vallivedu Premier League</p>

</footer>

<script type="module" src="script.js"></script>

</body>

</html>
